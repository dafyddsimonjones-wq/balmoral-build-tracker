    async function compressImage(file) {
      return new Promise(resolve => {
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
          URL.revokeObjectURL(url);
          let w = img.width, h = img.height;
          const max = 1400;
          if (w > max || h > max) {
            if (w > h) { h = Math.round(h * max / w); w = max; }
            else { w = Math.round(w * max / h); h = max; }
          }
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          c.getContext("2d").drawImage(img, 0, 0, w, h);
          c.toBlob(blob => {
            const r = new FileReader();
            r.onload = e => resolve({ dataUrl: e.target.result, size: blob.size });
            r.readAsDataURL(blob);
          }, "image/jpeg", 0.82);
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    function readAsDataUrl(file) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
    }

    function applyActions(data, actions) {
      let d = { ...data, todos:[...data.todos], stages:[...data.stages], payments:[...data.payments], contacts:[...data.contacts], notes:[...data.notes] };
      const log = [];
      for (const a of actions) {
        try {
          if (a.type==="add_todo") { d.todos=[...d.todos,{id:Date.now()+Math.random(),text:a.text,priority:a.priority||"medium",done:false,cat:a.cat||"Legal"}]; log.push(`Added: "${a.text}"`); }
          else if (a.type==="complete_todo") { const t=d.todos.find(t=>t.id===a.id); d.todos=d.todos.map(t=>t.id===a.id?{...t,done:true}:t); if(t) log.push(`Completed: "${t.text}"`); }
          else if (a.type==="delete_todo") { const t=d.todos.find(t=>t.id===a.id); d.todos=d.todos.filter(t=>t.id!==a.id); if(t) log.push(`Deleted: "${t.text}"`); }
          else if (a.type==="update_stage") { const s=d.stages.find(s=>s.id===a.id); d.stages=d.stages.map(s=>s.id===a.id?{...s,...(a.status&&{status:a.status}),...(a.date!==undefined&&{date:a.date})}:s); if(s) log.push(`Stage "${s.name}" → ${a.status||"updated"}`); }
          else if (a.type==="add_note") { d.notes=[...d.notes,{id:Date.now()+Math.random(),text:a.text,date:today()}]; log.push("Note added"); }
          else if (a.type==="add_contact") { d.contacts=[...d.contacts,{id:Date.now()+Math.random(),name:a.name,role:a.role||"",company:a.company||"",phone:a.phone||"",email:a.email||""}]; log.push(`Contact: ${a.name}`); }

          else if (a.type==="set_contract_price") { d.contractPrice=a.amount; log.push(`Contract price → $${a.amount.toLocaleString()}`); }
        } catch(e) { console.warn("action failed",a,e); }
      }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
      const [authed,     setAuthed]     = useState(false);
      const [correctPwd, setCorrectPwd] = useState(DEF_PWD);
      const [data,       setData]       = useState(null);
      const [loading,    setLoading]    = useState(true);
      const [tab,        setTab]        = useState("dashboard");
      const [todoCat,    setTodoCat]    = useState("All");
      const [newTodo,    setNewTodo]    = useState("");
      const [newPri,     setNewPri]     = useState("medium");
      const [newTCat,    setNewTCat]    = useState("Legal");
      const [newNote,    setNewNote]    = useState("");
      const [newCon,     setNewCon]     = useState({name:"",role:"",company:"",phone:"",email:""});
      const [showCon,    setShowCon]    = useState(false);
      const [editSt,     setEditSt]     = useState(null);
      const [stDate,     setStDate]     = useState("");
      const [fileCat,    setFileCat]    = useState("All");
      const [uploading,  setUploading]  = useState(false);
      const [upErr,      setUpErr]      = useState("");
      const [preview,    setPreview]    = useState(null);
      const [dragOver,   setDragOver]   = useState(false);
      const fileRef = useRef(null);
      const [chatIn,     setChatIn]     = useState("");
      const [chatBusy,   setChatBusy]   = useState(false);
      const chatEnd = useRef(null);
      const [newPwd,     setNewPwd]     = useState("");
      const [confPwd,    setConfPwd]    = useState("");
      const [pwdMsg,     setPwdMsg]     = useState("");
      const [bgConfig,   setBgConfig]   = useState({slot1:null,slot2:null,active:null});
      const [bgLoading,  setBgLoading]  = useState(false);
      const [bgErr,      setBgErr]      = useState("");
      const bgRef1 = useRef(null);
      const bgRef2 = useRef(null);

      useEffect(() => {
        (async () => {
          try { const v=await sbGet("pwd"); if(v) setCorrectPwd(v); } catch {}
          try { const v=await sbGet("data"); setData(v?JSON.parse(v):INIT); } catch { setData(INIT); }
          try { const v=await sbGet("bg"); if(v) setBgConfig(JSON.parse(v)); } catch {}
          setLoading(false);
        })();
      }, []);

      useEffect(() => { chatEnd.current?.scrollIntoView({behavior:"smooth"}); }, [data?.chatHistory]);

      const save = useCallback(async (next) => {
        setData(next);
        try { await sbSet("data", JSON.stringify({...next,files:next.files.map(f=>({...f,_src:undefined}))})); } catch(e) { console.warn("save failed",e); }
      }, []);

      const saveBg = async (next) => {
        setBgConfig(next);
        try { await sbSet("bg", JSON.stringify(next)); } catch {}
      };

      if (!authed) return <Login onAuth={()=>setAuthed(true)} correctPwd={correctPwd}/>;
      if (loading||!data) return (
        <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"16px",background:"#f5f4f0",color:"#5a6e7a",fontSize:"14px"}}>
          <div className="spinner"></div>
          Loading Balmoral Build Tracker…
        </div>
      );

      const doneStages = data.stages.filter(s=>s.status==="complete").length;
      const progress   = Math.round(doneStages/data.stages.length*100);
      const pendingN   = data.todos.filter(t=>!t.done).length;
      const highN      = data.todos.filter(t=>!t.done&&t.priority==="high").length;
      const totalPaid  = data.payments.filter(p=>p.paid).reduce((s,p)=>s+(p.amount||0),0);
      const ftodos     = todoCat==="All"?data.todos:data.todos.filter(t=>t.cat===todoCat);
      const ffiles     = fileCat==="All"?data.files:data.files.filter(f=>f.cat===fileCat);
      const imgFiles   = ffiles.filter(f=>f.type?.startsWith("image/"));
      const docFiles   = ffiles.filter(f=>!f.type?.startsWith("image/"));
      const activeBgUrl= bgConfig.active?bgConfig[bgConfig.active]:null;

      const markStage=(id,status)=>save({...data,stages:data.stages.map(s=>s.id===id?{...s,status}:s)});
      const saveDate=(id,date)=>{save({...data,stages:data.stages.map(s=>s.id===id?{...s,date}:s)});setEditSt(null);};
      const tickTodo=(id)=>save({...data,todos:data.todos.map(t=>t.id===id?{...t,done:!t.done}:t)});
      const delTodo=(id)=>save({...data,todos:data.todos.filter(t=>t.id!==id)});
      const addTodo=()=>{if(!newTodo.trim())return;save({...data,todos:[...data.todos,{id:Date.now(),text:newTodo.trim(),priority:newPri,done:false,cat:newTCat}]});setNewTodo("");};
      const addNote=()=>{if(!newNote.trim())return;save({...data,notes:[...data.notes,{id:Date.now(),text:newNote.trim(),date:today()}]});setNewNote("");};
      const delNote=(id)=>save({...data,notes:data.notes.filter(n=>n.id!==id)});
      const addCon=()=>{if(!newCon.name.trim())return;save({...data,contacts:[...data.contacts,{...newCon,id:Date.now()}]});setNewCon({name:"",role:"",company:"",phone:"",email:""});setShowCon(false);};
      const tickPay=(id)=>save({...data,payments:data.payments.map(p=>p.id===id?{...p,paid:!p.paid,paidDate:!p.paid?today():""}:p)});
      const editPay=(id,v)=>save({...data,payments:data.payments.map(p=>p.id===id?{...p,amount:v?parseFloat(v):null}:p)});

      const openPreview=async(file)=>{
        try{const d=await sbGetFile(file.id);if(d)setPreview({file,src:d});}catch{alert("Could not load file.");}
      };
      const delFile=async(id)=>{
        if(!confirm("Delete this file?"))return;
        try{await sbDelFile(id);}catch{}
        save({...data,files:data.files.filter(f=>f.id!==id)});
      };
      const uploadFiles=async(list)=>{
        setUpErr("");setUploading(true);
        let cur={...data};
        for(const file of Array.from(list)){
          try{
            let dataUrl,size;
            if(file.type.startsWith("image/")){const c=await compressImage(file);if(!c){setUpErr(`Could not process "${file.name}"`);continue;}dataUrl=c.dataUrl;size=c.size;}
            else{if(file.size>MAX_BYTES){setUpErr(`"${file.name}" too large (max 3.5MB)`);continue;}dataUrl=await readAsDataUrl(file);size=file.size;}
            const id=Date.now()+Math.random();
            const meta={name:file.name,type:file.type,cat:fileCat==="All"?"Other":fileCat,size,uploadedAt:today()};
            await sbSetFile(id,meta,dataUrl);
            cur={...cur,files:[...cur.files,{id,...meta}]};
            await save(cur);
          }catch(e){setUpErr(`Failed to upload "${file.name}" — try a smaller file`);}
        }
        setUploading(false);
      };
      const changePwd=async()=>{
        if(!newPwd||newPwd!==confPwd){setPwdMsg("Passwords don't match.");return;}
        if(newPwd.length<6){setPwdMsg("Must be at least 6 characters.");return;}
        try{await sbSet("pwd",newPwd);setCorrectPwd(newPwd);setPwdMsg("Password updated successfully.");setNewPwd("");setConfPwd("");}
        catch{setPwdMsg("Failed to save — please try again.");}
      };
      const uploadBg=async(slot,file)=>{
        if(!file)return;setBgErr("");setBgLoading(true);
        try{const compressed=await compressImage(file);if(!compressed){setBgErr("Could not process image.");setBgLoading(false);return;}const next={...bgConfig,[slot]:compressed.dataUrl,active:slot};await saveBg(next);}
        catch{setBgErr("Upload failed.");}
        setBgLoading(false);
      };
      const removeBg=async(slot)=>saveBg({...bgConfig,[slot]:null,active:bgConfig.active===slot?null:bgConfig.active});

      const sendChat=async()=>{
        if(!chatIn.trim()||chatBusy)return;
        const userMsg={role:"user",content:chatIn.trim()};
        const hist=[...(data.chatHistory||[]),userMsg];
        const snap={...data,chatHistory:hist};
        setData(snap);setChatIn("");setChatBusy(true);
        try{
          const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:buildPrompt(data),messages:hist})});
          const json=await res.json();
          const raw=json.content?.[0]?.text||"Sorry, something went wrong.";
          const m=raw.match(/<ACTIONS>([\s\S]*?)<\/ACTIONS>/);
          const text=raw.replace(/<ACTIONS>[\s\S]*?<\/ACTIONS>/,"").trim();
          let next=snap,log=[];
          if(m){try{const r=applyActions(snap,JSON.parse(m[1].trim()));next=r.d;log=r.log;}catch{}}
          save({...next,chatHistory:[...hist,{role:"assistant",content:text,changes:log}]});
        }catch{save({...snap,chatHistory:[...hist,{role:"assistant",content:"Something went wrong — please try again.",changes:[]}]});}
        setChatBusy(false);
      };

      const TABS=["dashboard","stages","finances","todos","files","contacts","notes","claude","settings"];
      const TLBL={dashboard:"Dashboard",stages:"Stages",finances:"Finances",todos:"To-Dos",files:"Files & Photos",contacts:"Contacts",notes:"Notes",claude:"✦ Ask Claude",settings:"⚙"};

      return (
        <div style={{minHeight:"100vh",color:"#1a2e35",position:"relative",backgroundImage:activeBgUrl?`url(${activeBgUrl})`:"none",backgroundSize:"cover",backgroundPosition:"center"}}>
          {activeBgUrl&&<div style={{position:"fixed",inset:0,background:"rgba(245,244,240,0.9)",zIndex:0,pointerEvents:"none"}}/>}
          <div style={{position:"relative",zIndex:1,minHeight:"100vh",background:activeBgUrl?"transparent":"#f5f4f0"}}>

            {/* Header */}
            <div style={{background:"linear-gradient(135deg,#006d7c 0%,#004f5a 100%)",padding:"1.25rem 2rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem"}}>
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"600",color:"#fff"}}>Balmoral Build Tracker</div>
                <div style={{fontSize:"12px",color:"#7ddce8",marginTop:"2px"}}>32 Grosvenor St · Brighton Homes · Oscar 33, Georgia Facade</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:"1.5rem",flexWrap:"wrap"}}>
                <a href="https://dafyddsimonjones-wq.github.io/balmoral-quotes/" target="_blank" rel="noreferrer"
                  style={{fontSize:"12px",color:"#7ddce8",textDecoration:"none",display:"flex",alignItems:"center",gap:"5px",border:"1px solid rgba(255,255,255,0.25)",padding:"5px 12px",borderRadius:"6px"}}>
                  📊 Quote Comparison
                </a>
                <div style={{textAlign:"right",fontSize:"12px",color:"#7ddce8"}}>
                  <div>Contract: <strong style={{color:"#fff"}}>${data.contractPrice.toLocaleString()}</strong></div>
                  <div>Deposit: <strong style={{color:"#00b9cc"}}>$3,000 paid 31 Mar 2026</strong></div>
                </div>
              </div>
            </div>

            {/* Nav */}
            <div style={{display:"flex",background:"#fff",borderBottom:"1px solid #e8e5de",padding:"0 1.5rem",overflowX:"auto"}}>
              {TABS.map(t=>(
                <button key={t} onClick={()=>setTab(t)} style={{background:"none",border:"none",padding:"12px 14px",fontSize:"13px",fontWeight:tab===t?"600":"400",color:tab===t?"#006d7c":"#5a6e7a",borderBottom:tab===t?"2px solid #006d7c":"2px solid transparent",cursor:"pointer",whiteSpace:"nowrap",fontFamily:"'Nunito Sans',sans-serif"}}>
                  {TLBL[t]}
                </button>
              ))}
            </div>

            <div style={{padding:"1.5rem 2rem",maxWidth:"960px",margin:"0 auto"}}>

              {/* ── DASHBOARD ── */}
              {tab==="dashboard"&&<>
                <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"14px"}}>
                  {[{l:"Build progress",v:`${progress}%`,s:`${doneStages} of ${data.stages.length} stages`,bar:true},{l:"Pending actions",v:pendingN,s:`${highN} high priority`,col:highN>0?"#c0392b":null},{l:"Paid to date",v:`$${totalPaid.toLocaleString()}`,s:`of $${data.contractPrice.toLocaleString()}`},{l:"Files uploaded",v:data.files.length,s:`${data.files.filter(f=>f.type?.startsWith("image/")).length} photos`}].map((m,i)=>(
                    <div key={i} style={C.met}>
                      <div style={{fontSize:"12px",color:"#7a8e99",marginBottom:"4px"}}>{m.l}</div>
                      <div style={{fontSize:"24px",fontWeight:"600",color:m.col||"#006d7c"}}>{m.v}</div>
                      {m.bar&&<div style={{margin:"6px 0 2px",height:"4px",background:"#e8e5de",borderRadius:"2px"}}><div style={{width:`${progress}%`,height:"100%",background:"#006d7c",borderRadius:"2px"}}/></div>}
                      <div style={{fontSize:"11px",color:"#8fa3ad",marginTop:"2px"}}>{m.s}</div>
                    </div>
                  ))}
                </div>
                <div style={C.card}>
                  <div style={C.h}>Current stage</div>
                  {data.stages.filter(s=>s.status==="active").map(s=>(
                    <div key={s.id} style={{display:"flex",gap:"12px"}}><div style={{...C.dot("active"),marginTop:"2px"}}/><div><div style={{fontWeight:"600"}}>{s.name}</div><div style={{fontSize:"13px",color:"#5a6e7a",marginTop:"2px"}}>{s.desc}</div></div></div>
                  ))}
                  {!data.stages.find(s=>s.status==="active")&&<div style={{fontSize:"13px",color:"#7a8e99"}}>No active stage — set one in Stages.</div>}
                </div>
                <div style={C.card}>
                  <div style={C.h}>Urgent to-dos</div>
                  {data.todos.filter(t=>!t.done&&t.priority==="high").slice(0,6).map(t=>(
                    <div key={t.id} style={C.row}>
                      <input type="checkbox" onChange={()=>tickTodo(t.id)} style={{marginTop:"3px",accentColor:"#006d7c",cursor:"pointer",flexShrink:0}}/>
                      <div><span style={C.tag("#c0392b")}>High</span><span style={C.tag("#5a6e7a")}>{t.cat}</span><div style={{fontSize:"13px",marginTop:"3px"}}>{t.text}</div></div>
                    </div>
                  ))}
                  {!data.todos.find(t=>!t.done&&t.priority==="high")&&<div style={{fontSize:"13px",color:"#7a8e99"}}>No urgent items — nice work.</div>}
                </div>
                <div style={C.card}>
                  <div style={C.h}>Risk register</div>
                  {[["Character Overlay cladding (sides & rear)","~$18,000 if council requires","#c0392b"],["Piering — screw piers worst case","up to +$12,000","#d68910"],["H1 → H2 slab upgrade","~+$500","#1e8449"],["Certainty Pricing","Not yet available","#d68910"],["$50k cashback + pre-rise pricing","Locked in ✓","#1e8449"]].map(([l,v,c],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:i<4?"1px solid #f0ede6":"none",gap:"12px",flexWrap:"wrap"}}>
                      <span style={{fontSize:"13px"}}>{l}</span><span style={{fontSize:"12px",fontWeight:"600",color:c}}>{v}</span>
                    </div>
                  ))}
                </div>
              </>}

              {/* ── STAGES ── */}
              {tab==="stages"&&<div style={C.card}>
                <div style={C.h}>Build stages</div>
                {data.stages.map((s,i)=>(
                  <div key={s.id} style={{display:"flex",gap:"12px",padding:"10px 0",borderBottom:"1px solid #f0ede6",flexWrap:"wrap"}}>
                    <div style={C.dot(s.status)}/>
                    <div style={{flex:1,minWidth:"200px"}}>
                      <div style={{display:"flex",gap:"8px",flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontWeight:"600",fontSize:"14px"}}>{i+1}. {s.name}</span>
                        <span style={{fontSize:"11px",fontWeight:"500",textTransform:"uppercase",color:s.status==="complete"?"#1e8449":s.status==="active"?"#00b9cc":"#9ca3af"}}>{s.status==="complete"?"✓ Complete":s.status==="active"?"● Active":"Pending"}</span>
                      </div>
                      <div style={{fontSize:"12px",color:"#5a6e7a",marginTop:"3px"}}>{s.desc}</div>
                      {editSt===s.id?(
                        <div style={{display:"flex",gap:"8px",marginTop:"8px",alignItems:"center",flexWrap:"wrap"}}>
                          <input type="text" placeholder="e.g. 15 Apr 2026" value={stDate} onChange={e=>setStDate(e.target.value)} style={{...C.inp,width:"160px"}}/>
                          <button style={C.btn("pri")} onClick={()=>saveDate(s.id,stDate)}>Save</button>
                          <button style={C.btn()} onClick={()=>setEditSt(null)}>Cancel</button>
                        </div>
                      ):<div style={{fontSize:"12px",color:"#8fa3ad",marginTop:"4px",cursor:"pointer"}} onClick={()=>{setEditSt(s.id);setStDate(s.date);}}>{s.date?`📅 ${s.date}`:"＋ Add date"}</div>}
                    </div>
                    <div style={{display:"flex",gap:"6px",flexShrink:0,alignItems:"flex-start"}}>
                      {s.status!=="complete"&&<button style={C.btn("pri")} onClick={()=>markStage(s.id,"complete")}>Done</button>}
                      {s.status==="complete"&&<button style={C.btn()} onClick={()=>markStage(s.id,"pending")}>Undo</button>}
                      {s.status==="pending"&&<button style={{...C.btn(),background:"#e0f7f4",color:"#006d7c"}} onClick={()=>markStage(s.id,"active")}>Set active</button>}
                    </div>
                  </div>
                ))}
              </div>}

              {/* ── FINANCES ── */}
              {tab==="finances"&&<>
                <div style={{display:"flex",gap:"10px",flexWrap:"wrap",marginBottom:"14px"}}>
                  {[["Contract price",`$${data.contractPrice.toLocaleString()}`,"provisional"],["Paid to date",`$${totalPaid.toLocaleString()}`,null,"#1e8449"],["Outstanding",`$${(data.contractPrice-totalPaid).toLocaleString()}`]].map(([l,v,s,c],i)=>(
                    <div key={i} style={C.met}><div style={{fontSize:"12px",color:"#7a8e99",marginBottom:"4px"}}>{l}</div><div style={{fontSize:"24px",fontWeight:"600",color:c||"#006d7c"}}>{v}</div>{s&&<div style={{fontSize:"11px",color:"#8fa3ad"}}>{s}</div>}</div>
                  ))}
                </div>
                <div style={C.card}>
                  <div style={C.h}>Payment schedule (Schedule 2)</div>
                  <div style={{fontSize:"12px",color:"#7a8e99",marginBottom:"12px"}}>Percentages per Brighton's HIA contract. Amounts calculated once contract price is confirmed.</div>
                  {data.payments.map(p=>{
                    const calcAmt = p.amount || (p.pct && p.pct !== "—" ? Math.round(data.contractPrice * parseFloat(p.pct) / 100) : null);
                    return (
                    <div key={p.id} style={{padding:"10px 0",borderBottom:"1px solid #f0ede6"}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"8px",alignItems:"flex-start"}}>
                        <div style={{display:"flex",gap:"10px",alignItems:"flex-start"}}>
                          <input type="checkbox" checked={p.paid} onChange={()=>tickPay(p.id)} style={{marginTop:"3px",accentColor:"#006d7c",cursor:"pointer",flexShrink:0}}/>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}}>
                              <div style={{fontWeight:"600",fontSize:"14px",textDecoration:p.paid?"line-through":"none",color:p.paid?"#8fa3ad":"#1a2e35"}}>{p.stage}</div>
                              {p.pct&&p.pct!=="—"&&<div style={{fontSize:"11px",fontWeight:"700",color:"#006d7c",background:"#e0f7f4",padding:"2px 7px",borderRadius:"4px"}}>{p.pct}</div>}
                            </div>
                            <div style={{fontSize:"12px",color:"#7a8e99"}}>Due: {p.due}</div>
                            {p.note&&<div style={{fontSize:"11px",color:"#8fa3ad",fontStyle:"italic"}}>{p.note}</div>}
                            {p.paid&&p.paidDate&&<div style={{fontSize:"11px",color:"#1e8449"}}>✓ Paid {p.paidDate}</div>}
                          </div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          {calcAmt&&!p.amount&&<div style={{fontSize:"11px",color:"#8fa3ad",marginBottom:"3px"}}>est. ${calcAmt.toLocaleString()}</div>}
                          <div style={{display:"flex",alignItems:"center",gap:"6px"}}>
                            <span style={{fontSize:"12px",color:"#5a6e7a"}}>$</span>
                            <input type="number" placeholder="TBC" value={p.amount||""} onChange={e=>editPay(p.id,e.target.value)} style={{...C.inp,width:"110px",textAlign:"right"}}/>
                          </div>
                        </div>
                      </div>
                    </div>
                  );})}
                  <div style={{padding:"10px 0",display:"flex",justifyContent:"space-between",alignItems:"center",borderTop:"2px solid #e8e5de",marginTop:"4px"}}>
                    <div style={{fontWeight:"600",fontSize:"13px"}}>Total (Contract Price)</div>
                    <div style={{fontWeight:"700",fontSize:"15px",color:"#006d7c"}}>${data.contractPrice.toLocaleString()}</div>
                  </div>
                </div>
                </div>
                <div style={{...C.card,background:"#f0f9ff",borderColor:"#bae6fd"}}>
                  <div style={{fontSize:"13px",fontWeight:"600",color:"#0369a1",marginBottom:"8px"}}>Variable risks not in quoted total</div>
                  {[["Character Overlay cladding","~$18,000"],["Screw piers worst case","up to +$12,000"],["H1 → H2 slab upgrade","~+$500"],["Butler's pantry (if added)","$5,380"],["Under-stairs door (if added)","$560"]].map(([l,v],i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:"13px",padding:"5px 0",borderBottom:i<4?"1px solid #e0f2fe":"none"}}>
                      <span style={{color:"#0369a1"}}>{l}</span><span style={{fontWeight:"600",color:"#0369a1"}}>{v}</span>
                    </div>
                  ))}
                </div>
              </>}

              {/* ── TO-DOS ── */}
              {tab==="todos"&&<div style={C.card}>
                <div style={{display:"flex",gap:"6px",marginBottom:"14px",flexWrap:"wrap"}}>
                  {TCATS.map(c=><button key={c} onClick={()=>setTodoCat(c)} style={C.pill(todoCat===c)}>{c}</button>)}
                </div>
                <div style={{display:"flex",gap:"8px",marginBottom:"16px",flexWrap:"wrap"}}>
                  <input value={newTodo} onChange={e=>setNewTodo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addTodo()} placeholder="Add a new action…" style={{...C.inp,flex:1,minWidth:"180px"}}/>
                  <select value={newPri} onChange={e=>setNewPri(e.target.value)} style={C.sel}><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select>
                  <select value={newTCat} onChange={e=>setNewTCat(e.target.value)} style={C.sel}>{TCATS.filter(c=>c!=="All").map(c=><option key={c}>{c}</option>)}</select>
                  <button style={C.btn("pri")} onClick={addTodo}>Add</button>
                </div>
                {[["high","#c0392b"],["medium","#d68910"],["low","#1e8449"]].map(([pri,col])=>{
                  const items=ftodos.filter(t=>t.priority===pri&&!t.done);
                  if(!items.length) return null;
                  return(<div key={pri} style={{marginBottom:"14px"}}>
                    <div style={{fontSize:"11px",fontWeight:"700",color:col,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"8px"}}>{pri.charAt(0).toUpperCase()+pri.slice(1)} priority</div>
                    {items.map(t=>(
                      <div key={t.id} style={C.row}>
                        <input type="checkbox" onChange={()=>tickTodo(t.id)} style={{marginTop:"3px",accentColor:"#006d7c",cursor:"pointer",flexShrink:0}}/>
                        <div style={{flex:1}}><span style={C.tag("#5a6e7a")}>{t.cat}</span><div style={{fontSize:"13px",marginTop:"3px"}}>{t.text}</div></div>
                        <button onClick={()=>delTodo(t.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:"18px",flexShrink:0}}>×</button>
                      </div>
                    ))}
                  </div>);
                })}
                {ftodos.filter(t=>t.done).length>0&&<div>
                  <div style={{fontSize:"11px",fontWeight:"700",color:"#8fa3ad",textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:"8px"}}>Completed</div>
                  {ftodos.filter(t=>t.done).map(t=>(
                    <div key={t.id} style={{...C.row,opacity:0.55}}>
                      <input type="checkbox" checked onChange={()=>tickTodo(t.id)} style={{marginTop:"3px",accentColor:"#006d7c",cursor:"pointer",flexShrink:0}}/>
                      <div style={{fontSize:"13px",textDecoration:"line-through",color:"#8fa3ad",flex:1}}>{t.text}</div>
                      <button onClick={()=>delTodo(t.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:"18px",flexShrink:0}}>×</button>
                    </div>
                  ))}
                </div>}
              </div>}

              {/* ── FILES ── */}
              {tab==="files"&&<>
                <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);uploadFiles(e.dataTransfer.files);}} onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${dragOver?"#006d7c":"#c8c3ba"}`,borderRadius:"12px",padding:"2rem",textAlign:"center",cursor:"pointer",background:dragOver?"#f0f9ff":"#faf9f7",marginBottom:"12px"}}>
                  <input ref={fileRef} type="file" multiple accept="image/*,.pdf,.doc,.docx,.xls,.xlsx" style={{display:"none"}} onChange={e=>uploadFiles(e.target.files)}/>
                  <div style={{fontSize:"32px",marginBottom:"8px"}}>{uploading?"⏳":"＋"}</div>
                  <div style={{fontWeight:"600",color:"#006d7c",marginBottom:"4px"}}>{uploading?"Uploading…":"Drop files here or click to upload"}</div>
                  <div style={{fontSize:"12px",color:"#7a8e99"}}>Photos, PDFs, quotes, plans, council docs · Images compressed automatically · Max 3.5MB for documents</div>
                  {upErr&&<div style={{marginTop:"8px",fontSize:"12px",color:"#c0392b"}}>{upErr}</div>}
                </div>
                <div style={{display:"flex",gap:"6px",marginBottom:"14px",flexWrap:"wrap"}}>
                  {FCATS.map(c=><button key={c} onClick={()=>setFileCat(c)} style={C.pill(fileCat===c)}>{c}</button>)}
                </div>
                {data.files.length===0&&<div style={{...C.card,color:"#8fa3ad",fontSize:"13px",textAlign:"center",padding:"2rem"}}>No files uploaded yet.</div>}
                {imgFiles.length>0&&<>
                  <div style={{fontSize:"11px",fontWeight:"600",color:"#5a6e7a",marginBottom:"10px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Photos ({imgFiles.length})</div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(150px,1fr))",gap:"10px",marginBottom:"16px"}}>
                    {imgFiles.map(f=>(
                      <div key={f.id} style={{borderRadius:"10px",overflow:"hidden",border:"1px solid #e8e5de",cursor:"pointer",position:"relative"}} onClick={()=>openPreview(f)}>
                        <Thumb id={f.id}/>
                        <div style={{padding:"6px 8px"}}><div style={{fontSize:"11px",fontWeight:"500",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div><div style={{fontSize:"10px",color:"#8fa3ad"}}>{f.uploadedAt}</div></div>
                        <button onClick={e=>{e.stopPropagation();delFile(f.id);}} style={{position:"absolute",top:"4px",right:"4px",background:"rgba(0,0,0,0.55)",border:"none",borderRadius:"50%",width:"22px",height:"22px",color:"#fff",cursor:"pointer",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                      </div>
                    ))}
                  </div>
                </>}
                {docFiles.length>0&&<>
                  <div style={{fontSize:"11px",fontWeight:"600",color:"#5a6e7a",marginBottom:"10px",textTransform:"uppercase",letterSpacing:"0.6px"}}>Documents ({docFiles.length})</div>
                  <div style={C.card}>
                    {docFiles.map((f,i)=>(
                      <div key={f.id} style={{display:"flex",gap:"12px",alignItems:"center",padding:"10px 0",borderBottom:i<docFiles.length-1?"1px solid #f0ede6":"none"}}>
                        <div style={{width:"36px",height:"36px",borderRadius:"8px",background:f.type==="application/pdf"?"#fee2e2":"#e0f2fe",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",flexShrink:0}}>{f.type==="application/pdf"?"📄":"📋"}</div>
                        <div style={{flex:1,minWidth:0}}><div style={{fontWeight:"500",fontSize:"13px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.name}</div><div style={{fontSize:"11px",color:"#7a8e99"}}>{f.cat} · {Math.round((f.size||0)/1024)}KB · {f.uploadedAt}</div></div>
                        <div style={{display:"flex",gap:"6px",flexShrink:0}}>
                          <button style={C.btn()} onClick={()=>openPreview(f)}>View</button>
                          <button style={C.btn("red")} onClick={()=>delFile(f.id)}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </>}
              </>}

              {/* ── CONTACTS ── */}
              {tab==="contacts"&&<>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(240px,1fr))",gap:"12px",marginBottom:"12px"}}>
                  {data.contacts.map(c=>(
                    <div key={c.id} style={{...C.card,marginBottom:0}}>
                      <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"linear-gradient(135deg,#006d7c,#004f5a)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:"600",fontSize:"13px",marginBottom:"10px"}}>{c.name.split(" ").map(w=>w[0]).slice(0,2).join("")}</div>
                      <div style={{fontWeight:"600"}}>{c.name}</div>
                      <div style={{fontSize:"12px",color:"#00b9cc",fontWeight:"500",marginTop:"2px"}}>{c.role}</div>
                      {c.company&&<div style={{fontSize:"12px",color:"#7a8e99"}}>{c.company}</div>}
                      <div style={{marginTop:"10px",display:"flex",flexDirection:"column",gap:"4px"}}>
                        {c.phone&&<a href={`tel:${c.phone}`} style={{fontSize:"13px",color:"#006d7c",textDecoration:"none"}}>📞 {c.phone}</a>}
                        {c.email&&<a href={`mailto:${c.email}`} style={{fontSize:"13px",color:"#006d7c",textDecoration:"none",wordBreak:"break-all"}}>✉ {c.email}</a>}
                      </div>
                    </div>
                  ))}
                </div>
                {showCon?(
                  <div style={C.card}>
                    <div style={C.h}>Add contact</div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px",marginBottom:"12px"}}>
                      {[["name","Name *"],["role","Role"],["company","Company"],["phone","Phone"],["email","Email"]].map(([f,l])=>(
                        <input key={f} placeholder={l} value={newCon[f]} onChange={e=>setNewCon(p=>({...p,[f]:e.target.value}))} style={C.inp}/>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:"8px"}}><button style={C.btn("pri")} onClick={addCon}>Save</button><button style={C.btn()} onClick={()=>setShowCon(false)}>Cancel</button></div>
                  </div>
                ):<button style={C.btn("pri")} onClick={()=>setShowCon(true)}>＋ Add contact</button>}
              </>}

              {/* ── NOTES ── */}
              {tab==="notes"&&<>
                <div style={C.card}>
                  <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Add a note — conversations with June, decisions made, things to remember…" rows={4} style={{...C.inp,resize:"vertical",marginBottom:"10px"}}/>
                  <button style={C.btn("pri")} onClick={addNote}>Save note</button>
                </div>
                {data.notes.length===0&&<div style={{...C.card,color:"#8fa3ad",fontSize:"13px"}}>No notes yet.</div>}
                {[...data.notes].reverse().map(n=>(
                  <div key={n.id} style={C.card}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                      <div style={{fontSize:"13px",lineHeight:"1.6",flex:1,whiteSpace:"pre-wrap"}}>{n.text}</div>
                      <button onClick={()=>delNote(n.id)} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:"18px",marginLeft:"12px",flexShrink:0}}>×</button>
                    </div>
                    <div style={{fontSize:"11px",color:"#8fa3ad",marginTop:"8px"}}>{n.date}</div>
                  </div>
                ))}
              </>}

              {/* ── CLAUDE ── */}
              {tab==="claude"&&<div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 170px)",minHeight:"500px"}}>
                <div style={{...C.card,background:"#f0f9ff",borderColor:"#bae6fd",marginBottom:"10px",padding:"0.75rem 1.25rem",flexShrink:0}}>
                  <div style={{fontSize:"12px",color:"#0369a1",lineHeight:"1.6"}}><strong>Claude knows your entire build.</strong> Ask questions or request changes — "add a to-do to call June about cladding", "mark site inspection complete", "what are my urgent actions?"</div>
                </div>
                <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:"12px",padding:"4px 0",marginBottom:"12px"}}>
                  {(!data.chatHistory||data.chatHistory.length===0)&&(
                    <div style={{textAlign:"center",padding:"3rem 2rem",color:"#8fa3ad"}}>
                      <div style={{fontSize:"32px",marginBottom:"12px"}}>✦</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#5a6e7a",marginBottom:"10px"}}>How can I help with the build?</div>
                      <div style={{fontSize:"13px",lineHeight:"1.9",color:"#7a8e99"}}>"What are my urgent to-dos?"<br/>"Mark the site inspection as complete"<br/>"What are the key risks right now?"</div>
                    </div>
                  )}
                  {(data.chatHistory||[]).map((msg,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:msg.role==="user"?"flex-end":"flex-start"}}>
                      <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:msg.role==="user"?"16px 16px 4px 16px":"16px 16px 16px 4px",background:msg.role==="user"?"#006d7c":"#fff",color:msg.role==="user"?"#fff":"#1a2e35",fontSize:"13px",lineHeight:"1.6",border:msg.role==="assistant"?"1px solid #e8e5de":"none",whiteSpace:"pre-wrap"}}>
                        {msg.content}
                        {msg.changes?.length>0&&<div style={{marginTop:"10px",padding:"8px 10px",background:"#f0f9ff",borderRadius:"8px",border:"1px solid #bae6fd"}}><div style={{fontSize:"11px",fontWeight:"600",color:"#0369a1",marginBottom:"4px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Changes made</div>{msg.changes.map((c,ci)=><div key={ci} style={{fontSize:"12px",color:"#0369a1"}}>✓ {c}</div>)}</div>}
                      </div>
                    </div>
                  ))}
                  {chatBusy&&<div style={{display:"flex"}}><div style={{padding:"12px 16px",borderRadius:"16px 16px 16px 4px",background:"#fff",border:"1px solid #e8e5de"}}><div style={{display:"flex",gap:"5px",alignItems:"center"}}>{[0,1,2].map(i=><div key={i} style={{width:"7px",height:"7px",borderRadius:"50%",background:"#00b9cc",animation:`bounce 1.2s ease-in-out ${i*0.15}s infinite`}}/>)}</div></div></div>}
                  <div ref={chatEnd}/>
                </div>
                <div style={{display:"flex",gap:"8px",alignItems:"flex-end",flexShrink:0}}>
                  <textarea value={chatIn} onChange={e=>setChatIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}} placeholder="Message Claude… (Enter to send, Shift+Enter for new line)" rows={2} style={{...C.inp,flex:1,resize:"none"}}/>
                  <div style={{display:"flex",flexDirection:"column",gap:"6px"}}>
                    <button style={{...C.btn("pri"),padding:"10px 18px"}} onClick={sendChat} disabled={chatBusy}>{chatBusy?"…":"Send"}</button>
                    {data.chatHistory?.length>0&&<button style={{...C.btn(),fontSize:"11px",padding:"5px 10px"}} onClick={()=>save({...data,chatHistory:[]})}>Clear</button>}
                  </div>
                </div>
              </div>}

              {/* ── SETTINGS ── */}
              {tab==="settings"&&<>
                <div style={C.card}>
                  <div style={C.h}>Background image</div>
                  <div style={{fontSize:"13px",color:"#5a6e7a",marginBottom:"16px"}}>Upload up to two background images and switch between them. A soft overlay keeps everything readable.</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
                    {["slot1","slot2"].map((slot,i)=>(
                      <div key={slot} style={{border:`2px solid ${bgConfig.active===slot?"#006d7c":"#e8e5de"}`,borderRadius:"12px",overflow:"hidden",background:"#faf9f7"}}>
                        {bgConfig[slot]?(
                          <>
                            <div style={{position:"relative",height:"140px"}}>
                              <img src={bgConfig[slot]} alt="" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                              {bgConfig.active===slot&&<div style={{position:"absolute",top:"8px",left:"8px",background:"#006d7c",color:"#fff",fontSize:"10px",fontWeight:"700",padding:"3px 8px",borderRadius:"4px",textTransform:"uppercase",letterSpacing:"0.5px"}}>Active</div>}
                            </div>
                            <div style={{padding:"10px 12px",display:"flex",gap:"8px",flexWrap:"wrap"}}>
                              <div style={{fontSize:"12px",color:"#5a6e7a",flex:1,alignSelf:"center"}}>Image {i+1}</div>
                              {bgConfig.active!==slot&&<button style={{...C.btn("pri"),fontSize:"11px",padding:"5px 12px"}} onClick={()=>saveBg({...bgConfig,active:slot})}>Use this</button>}
                              {bgConfig.active===slot&&<button style={{...C.btn(),fontSize:"11px",padding:"5px 12px"}} onClick={()=>saveBg({...bgConfig,active:null})}>Deactivate</button>}
                              <button style={{...C.btn("red"),fontSize:"11px",padding:"5px 12px"}} onClick={()=>removeBg(slot)}>Remove</button>
                            </div>
                          </>
                        ):(
                          <div onClick={()=>(slot==="slot1"?bgRef1:bgRef2).current?.click()} style={{height:"180px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:"8px",padding:"1rem"}}>
                            <div style={{fontSize:"28px",opacity:0.4}}>＋</div>
                            <div style={{fontSize:"12px",color:"#7a8e99",textAlign:"center"}}>Upload image {i+1}</div>
                            <div style={{fontSize:"11px",color:"#8fa3ad",textAlign:"center"}}>JPG or PNG · auto-compressed</div>
                          </div>
                        )}
                        <input ref={slot==="slot1"?bgRef1:bgRef2} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0])uploadBg(slot,e.target.files[0]);e.target.value="";}}/>
                      </div>
                    ))}
                  </div>
                  {bgLoading&&<div style={{fontSize:"12px",color:"#5a6e7a"}}>Uploading…</div>}
                  {bgErr&&<div style={{fontSize:"12px",color:"#c0392b"}}>{bgErr}</div>}
                </div>
                <div style={C.card}>
                  <div style={C.h}>Change password</div>
                  <div style={{fontSize:"13px",color:"#5a6e7a",marginBottom:"14px"}}>Default is <code style={{background:"#f5f4f0",padding:"2px 6px",borderRadius:"4px",fontSize:"12px"}}>balmoral2026</code>. Share with anyone who needs access.</div>
                  <div style={{display:"flex",flexDirection:"column",gap:"10px",maxWidth:"320px"}}>
                    <input type="password" placeholder="New password (min 6 characters)" value={newPwd} onChange={e=>setNewPwd(e.target.value)} style={C.inp}/>
                    <input type="password" placeholder="Confirm new password" value={confPwd} onChange={e=>setConfPwd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&changePwd()} style={C.inp}/>
                    <button style={C.btn("pri")} onClick={changePwd}>Update password</button>
                    {pwdMsg&&<div style={{fontSize:"13px",color:pwdMsg.includes("success")?"#1e8449":"#c0392b"}}>{pwdMsg}</div>}
                  </div>
                </div>
                <div style={C.card}>
                  <div style={C.h}>About</div>
                  <div style={{fontSize:"13px",color:"#5a6e7a",lineHeight:"1.9"}}>
                    <div><strong style={{color:"#1a2e35"}}>Property:</strong> 32 Grosvenor St, Balmoral QLD 4171</div>
                    <div><strong style={{color:"#1a2e35"}}>Builder:</strong> Brighton Homes (MJH Group)</div>
                    <div><strong style={{color:"#1a2e35"}}>Design:</strong> Oscar 33, Georgia Facade</div>
                    <div><strong style={{color:"#1a2e35"}}>Consultant:</strong> June Matthews · 0418 165 126</div>
                    <div><strong style={{color:"#1a2e35"}}>Quote:</strong> #766947 · $602,840 provisional</div>
                    <div><strong style={{color:"#1a2e35"}}>Deposit:</strong> $3,000 paid 31 Mar 2026 (refundable until CT)</div>
                    <div style={{marginTop:"12px",padding:"10px 12px",background:"#f5f4f0",borderRadius:"8px",fontSize:"12px",color:"#7a8e99",lineHeight:"1.6"}}>Data stored in Supabase — all users with the password see the same information in real time across all devices.</div>
                  </div>
                </div>
              </>}

            </div>
          </div>
          {preview&&<Preview file={preview.file} src={preview.src} onClose={()=>setPreview(null)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
