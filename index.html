async function sbGet(key) {
  try {
    const r = await fetch(`${SB_URL}/rest/v1/tracker_data?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: H
    });
    const rows = await r.json();
    return rows?.[0]?.value ?? null;
  } catch {
    return null;
  }
}
async function sbSet(key, value) {
  await fetch(`${SB_URL}/rest/v1/tracker_data`, {
    method: "POST",
    headers: {
      ...H,
      Prefer: "resolution=merge-duplicates"
    },
    body: JSON.stringify({
      key,
      value,
      updated_at: new Date().toISOString()

  });
}

function today() {
  return new Date().toLocaleDateString("en-AU", {
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}
async function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.width,
        h = img.height;
      const max = 1400;
      if (w > max || h > max) {
        if (w > h) {
          h = Math.round(h * max / w);
          w = max;
        } else {
          w = Math.round(w * max / h);
          h = max;
        }
      }
      const c = document.createElement("canvas");
      c.width = w;
      c.height = h;
      c.getContext("2d").drawImage(img, 0, 0, w, h);
      c.toBlob(blob => {
        const r = new FileReader();
        r.onload = e => resolve({
          dataUrl: e.target.result,
          size: blob.size
        });
        r.readAsDataURL(blob);
      }, "image/jpeg", 0.82);
    };
    img.onerror = () => resolve(null);
    img.src = url;
  });
}
function readAsDataUrl(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function applyActions(data, actions) {
  let d = {
    ...data,
    todos: [...data.todos],
    stages: [...data.stages],
    payments: [...data.payments],
    contacts: [...data.contacts],
    notes: [...data.notes]
  };
  const log = [];
  for (const a of actions) {
    try {
      if (a.type === "add_todo") {
        d.todos = [...d.todos, {
          id: Date.now() + Math.random(),
          text: a.text,
          priority: a.priority || "medium",
          done: false,
          cat: a.cat || "Legal"
        }];
        log.push(`Added: "${a.text}"`);
      } else if (a.type === "complete_todo") {
        const t = d.todos.find(t => t.id === a.id);
        d.todos = d.todos.map(t => t.id === a.id ? {
          ...t,
          done: true
        } : t);
        if (t) log.push(`Completed: "${t.text}"`);
      } else if (a.type === "delete_todo") {
        const t = d.todos.find(t => t.id === a.id);
        d.todos = d.todos.filter(t => t.id !== a.id);
        if (t) log.push(`Deleted: "${t.text}"`);
      } else if (a.type === "update_stage") {
        const s = d.stages.find(s => s.id === a.id);
        d.stages = d.stages.map(s => s.id === a.id ? {
          ...s,
          ...(a.status && {
            status: a.status
          }),
          ...(a.date !== undefined && {
            date: a.date
          })
        } : s);
        if (s) log.push(`Stage "${s.name}" → ${a.status || "updated"}`);
      } else if (a.type === "add_note") {
        d.notes = [...d.notes, {
          id: Date.now() + Math.random(),
          text: a.text,
          date: today()
        }];
        log.push("Note added");
      } else if (a.type === "add_contact") {
        d.contacts = [...d.contacts, {
          id: Date.now() + Math.random(),
          name: a.name,
          role: a.role || "",
          company: a.company || "",
          phone: a.phone || "",
          email: a.email || ""
        }];
        log.push(`Contact: ${a.name}`);
      } else if (a.type === "update_payment") {
        d.payments = d.payments.map(p => p.id === a.id ? {
          ...p,
          ...(a.amount !== undefined && {
            amount: a.amount
          }),
          ...(a.paid !== undefined && {
            paid: a.paid
          }),
          ...(a.paidDate && {
            paidDate: a.paidDate
          })
        } : p);
        log.push("Payment updated");
      } else if (a.type === "set_contract_price") {
        d.contractPrice = a.amount;
        log.push(`Contract price → $${a.amount.toLocaleString()}`);
      }
    } catch (e) {
      console.warn("action failed", a, e);
    }
  }
  return {
    d,
    log
  };
}
